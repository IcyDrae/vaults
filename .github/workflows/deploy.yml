name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Set up Docker
      uses: docker/setup-buildx-action@v2

    - name: Build frontend image
      run: docker build -t vaults-frontend -f docker/frontend/Dockerfile.prod ./frontend

    - name: Build backend image
      run: docker build -t vaults-php -f docker/php/Dockerfile ./api

    - name: Run containers (test)
      run: |
        docker compose -f docker/docker-compose.prod.yml up -d

    - name: Stop containers
      run: docker compose -f docker/docker-compose.prod.yml down
